name: Generate Android Development APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21" # Capacitor 7 and modern Android Gradle Plugin require Java 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync

      - name: Convert Line Endings (gradlew)
        run: |
          if [ -d "android" ]; then
            sudo apt-get update && sudo apt-get install -y dos2unix
            dos2unix android/gradlew
            chmod +x android/gradlew
          fi

      - name: Build Android APK
        run: |
          if [ -d "android" ]; then
            cd android
            ./gradlew assembleDebug
          else
            echo "Android platform not found. Did you run 'npx cap add android' and commit the folder?"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paymind-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
